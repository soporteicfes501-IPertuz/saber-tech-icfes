<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SABER TECH — Plataforma de Evaluación</title>
  <style>
    :root {
      --primary: #1a56db;
      --primary-hover: #1e429f;
      --bg: #f3f4f6;
      --card-bg: #ffffff;
      --text: #1f2937;
      --danger: #e02424;
      --danger-hover: #9b1c1c;
      --success: #0e9f6e;
      --secondary: #6b7280;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg); color: var(--text); padding: 20px; }
    
    .container { max-width: 900px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    h1, h2 { color: var(--primary); margin-bottom: 15px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select, button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    
    button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background-color: var(--primary-hover); }
    button:disabled { background-color: #9ca3af; cursor: not-allowed; }

    .btn-danger { background-color: var(--danger); }
    .btn-danger:hover { background-color: var(--danger-hover); }
    .btn-secondary { background-color: var(--secondary); }
    .btn-secondary:hover { background-color: #4b5563; }

    .hidden { display: none !important; }
    
    .alert { padding: 12px; border-radius: 5px; margin-bottom: 15px; font-weight: 500; }
    .alert-danger { background-color: #fde8e8; color: var(--danger); }
    .alert-success { background-color: #def7ec; color: var(--success); }
    
    /* Opciones de Preguntas */
    .question-box { margin-bottom: 20px; border-bottom: 1px solid #e5e7eb; padding-bottom: 15px; }
    .options-grid { display: flex; gap: 10px; margin-top: 10px; }
    .opt-btn { width: 50px; height: 50px; border-radius: 50%; font-weight: bold; background: #e5e7eb; color: var(--text); border: none; }
    .opt-btn.selected { background: var(--primary); color: white; }

    /* Modal Docente */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>

<div class="container">

  <!-- ESTADO DE CONEXIÓN Y ALERTAS -->
  <div id="status-alert" class="alert hidden"></div>

  <!-- PANTALLA 1: INICIO DE SESIÓN ESTUDIANTE -->
  <div id="view-login" class="card">
    <h2>SABER TECH — Acceso Estudiante</h2>
    <div class="form-group">
      <label>Selecciona tu Nombre:</label>
      <select id="select-estudiante">
        <option value="">Cargando lista de estudiantes...</option>
      </select>
    </div>
    <div class="form-group">
      <label>Clave de Acceso (si aplica):</label>
      <input type="password" id="input-clave" placeholder="Ingresa tu clave">
    </div>
    <div class="form-group">
      <label>Protocolo de Examen:</label>
      <input type="text" id="input-protocolo" value="ICFES-SABER11" placeholder="Ej: ICFES-SABER11">
    </div>
    <div class="form-group">
      <label>Sesión:</label>
      <select id="select-sesion">
        <option value="1">Sesión 1</option>
        <option value="2">Sesión 2</option>
      </select>
    </div>
    
    <div style="display: flex; gap: 10px;">
      <button type="button" onclick="iniciarExamen()">Ingresar al Examen</button>
      <button type="button" onclick="regresarAlInicio()" class="btn-secondary" style="width: 30%;">Limpiar</button>
    </div>

    <div style="margin-top: 15px; text-align: right;">
      <a href="javascript:void(0)" onclick="abrirModalDocente(event)" style="color: var(--primary); font-size: 14px;">Acceso Docente</a>
    </div>
  </div>

  <!-- PANTALLA 2: EVALUACIÓN / HOJA DE RESPUESTAS -->
  <div id="view-examen" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
      <div>
        <h2 id="estudiante-info" style="margin-bottom:0;">Estudiante</h2>
        <span id="badge-advertencias" style="color: var(--danger); font-weight:bold; font-size: 14px;">Infracciones: 0</span>
      </div>
      <button type="button" onclick="salirExamenEstudiante()" class="btn-danger" style="width: auto; padding: 8px 18px;">Salir del Examen</button>
    </div>

    <div id="preguntas-container">
      <!-- Generado dinámicamente -->
    </div>

    <button type="button" onclick="finalizarExamen()" style="background-color: var(--success); margin-top:20px;">Finalizar y Guardar Todo</button>
  </div>

  <!-- PANTALLA 3: PANEL DOCENTE -->
  <div id="view-docente" class="card hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h2>Panel del Docente</h2>
      <button type="button" onclick="regresarAlInicio()" class="btn-secondary" style="width: auto; padding: 8px 18px;">Salir</button>
    </div>
    <div style="margin-top: 20px;">
      <button type="button" onclick="cargarReportes()" style="margin-bottom: 10px;">Actualizar Reportes</button>
      <div id="reportes-output" style="background:#f8fafc; padding:10px; border-radius:5px; font-family:monospace; font-size:12px; white-space:pre-wrap; max-height:300px; overflow-y:auto;">
        Haga clic en 'Actualizar Reportes' para ver los datos de la hoja.
      </div>
    </div>
  </div>

</div>

<!-- MODAL DOCENTE -->
<div id="modal-docente" class="modal hidden" style="display: none;">
  <div class="modal-content">
    <h3>Autenticación Docente</h3>
    <div class="form-group" style="margin-top:10px;">
      <input type="password" id="input-teacher-pass" placeholder="Contraseña Docente">
    </div>
    <button type="button" onclick="loginDocente()">Entrar</button>
    <button type="button" onclick="cerrarModalDocente(event)" class="btn-secondary" style="margin-top:8px;">Cancelar / Salir</button>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZ9ufm0LV6H4LwKMh7FzoHI4-WGP9AonGVJjsYX2N0Nr8AeYO32Evu0C2FCyy5euPYRQ/exec'; 

  let globalData = {
    estudiantes: [],
    claves: {},
    estudianteActual: null,
    gradoActual: '',
    protocolo: '',
    sesion: '',
    advertencias: 0,
    respuestasGuardadas: {}
  };

  window.onload = function() {
    cargarDatosIniciales();
    configurarControlInfracciones();
  };

  function cargarDatosIniciales() {
    mostrarAlerta('Cargando datos del sistema...', 'info');
    const script = document.createElement('script');
    script.src = `${SCRIPT_URL}?action=getInit&callback=procesarInit`;
    document.body.appendChild(script);
  }

  function procesarInit(response) {
    if (response && response.success) {
      globalData.estudiantes = response.estudiantes || [];
      globalData.claves = response.claves || {};
      
      const select = document.getElementById('select-estudiante');
      select.innerHTML = '<option value="">-- Selecciona un estudiante --</option>';
      
      globalData.estudiantes.forEach(est => {
        const opt = document.createElement('option');
        opt.value = est.nombre;
        opt.textContent = `${est.nombre} (${est.grado})`;
        opt.dataset.grado = est.grado;
        select.appendChild(opt);
      });
      ocultarAlerta();
    } else {
      mostrarAlerta('Error cargando lista de estudiantes.', 'danger');
    }
  }

  function guardarRespuestaIndividual(numPregunta, opcion) {
    globalData.respuestasGuardadas[`P${numPregunta}`] = opcion;

    const payload = {
      action: 'guardarRespuesta',
      estudiante: globalData.estudianteActual,
      grado: globalData.gradoActual,
      protocolo: globalData.protocolo,
      sesion: globalData.sesion,
      pregunta: `P${numPregunta}`,
      respuesta: opcion
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    }).catch(err => console.error('Error guardando respuesta:', err));
  }

  function registrarInfraccionBackend() {
    globalData.advertencias++;
    document.getElementById('badge-advertencias').textContent = `Infracciones: ${globalData.advertencias}`;

    const payload = {
      action: 'registrarInfraccion',
      estudiante: globalData.estudianteActual,
      advertencias: globalData.advertencias
    };

    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    
    alert(`¡ADVERTENCIA! Has salido de la pantalla del examen. Infracción registrada (${globalData.advertencias}).`);
  }

  function configurarControlInfracciones() {
    window.addEventListener('blur', () => {
      if (!document.getElementById('view-examen').classList.contains('hidden')) {
        registrarInfraccionBackend();
      }
    });
  }

  function iniciarExamen() {
    const select = document.getElementById('select-estudiante');
    const estNombre = select.value;
    const claveIngresada = document.getElementById('input-clave').value.trim();
    
    if (!estNombre) {
      alert('Selecciona un estudiante.');
      return;
    }

    if (globalData.claves[estNombre] && globalData.claves[estNombre] !== claveIngresada) {
      alert('Clave de acceso incorrecta para este estudiante.');
      return;
    }

    const selectedOpt = select.options[select.selectedIndex];
    globalData.estudianteActual = estNombre;
    globalData.gradoActual = selectedOpt.dataset.grado || '';
    globalData.protocolo = document.getElementById('input-protocolo').value.trim() || 'SABER-11';
    globalData.sesion = document.getElementById('select-sesion').value;

    document.getElementById('estudiante-info').textContent = `${globalData.estudianteActual} (${globalData.gradoActual})`;
    
    generarHojaRespuestas(30);
    
    document.getElementById('view-login').classList.add('hidden');
    document.getElementById('view-examen').classList.remove('hidden');
  }

  function generarHojaRespuestas(totalPreguntas) {
    const container = document.getElementById('preguntas-container');
    container.innerHTML = '';

    for (let i = 1; i <= totalPreguntas; i++) {
      const qBox = document.createElement('div');
      qBox.className = 'question-box';
      
      const title = document.createElement('p');
      title.innerHTML = `<strong>Pregunta ${i}</strong>`;
      qBox.appendChild(title);

      const optGrid = document.createElement('div');
      optGrid.className = 'options-grid';

      ['A', 'B', 'C', 'D'].forEach(opcion => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'opt-btn';
        btn.textContent = opcion;
        btn.onclick = function() {
          optGrid.querySelectorAll('.opt-btn').forEach(b => b.className = 'opt-btn');
          btn.className = 'opt-btn selected';
          guardarRespuestaIndividual(i, opcion);
        };
        optGrid.appendChild(btn);
      });

      qBox.appendChild(optGrid);
      container.appendChild(qBox);
    }
  }

  function finalizarExamen() {
    if (confirm('¿Estás seguro de que deseas finalizar el examen?')) {
      alert('Respuestas registradas exitosamente.');
      regresarAlInicio();
    }
  }

  function salirExamenEstudiante() {
    if (confirm('¿Estás seguro de que deseas salir del examen? Se conservarán las respuestas guardadas.')) {
      regresarAlInicio();
    }
  }

  // --- MENEJO DE MODAL DOCENTE Y REGRESO ---
  function abrirModalDocente(e) { 
    if (e) e.preventDefault();
    const modal = document.getElementById('modal-docente');
    modal.classList.remove('hidden'); 
    modal.style.display = 'flex';
  }

  function cerrarModalDocente(e) { 
    if (e) e.preventDefault();
    document.getElementById('input-teacher-pass').value = '';
    const modal = document.getElementById('modal-docente');
    modal.classList.add('hidden'); 
    modal.style.display = 'none';
  }

  function regresarAlInicio() {
    globalData.estudianteActual = null;
    globalData.gradoActual = '';
    globalData.advertencias = 0;
    globalData.respuestasGuardadas = {};

    document.getElementById('input-clave').value = '';
    document.getElementById('input-teacher-pass').value = '';
    document.getElementById('select-estudiante').value = '';
    
    document.getElementById('view-examen').classList.add('hidden');
    document.getElementById('view-docente').classList.add('hidden');
    cerrarModalDocente();
    
    document.getElementById('view-login').classList.remove('hidden');
  }

  function loginDocente() {
    const pass = document.getElementById('input-teacher-pass').value;
    if (!pass) {
      alert('Por favor ingresa la contraseña.');
      return;
    }
    mostrarAlerta('Verificando contraseña...', 'info');

    const script = document.createElement('script');
    script.src = `${SCRIPT_URL}?action=getReportes&callback=procesarLoginDocente`; 
    document.body.appendChild(script);
  }

  function procesarLoginDocente(resp) {
    const pass = document.getElementById('input-teacher-pass').value;
    if (pass === 'saber2026') {
      cerrarModalDocente();
      ocultarAlerta();
      document.getElementById('view-login').classList.add('hidden');
      document.getElementById('view-docente').classList.remove('hidden');
      if(resp && resp.success) {
        document.getElementById('reportes-output').textContent = JSON.stringify(resp, null, 2);
      }
    } else {
      mostrarAlerta('Contraseña docente incorrecta', 'danger');
    }
  }

  function cargarReportes() {
    document.getElementById('reportes-output').textContent = "Cargando reportes...";
    const script = document.createElement('script');
    script.src = `${SCRIPT_URL}?action=getReportes&callback=mostrarReportes`;
    document.body.appendChild(script);
  }

  function mostrarReportes(resp) {
    if (resp && resp.success) {
      document.getElementById('reportes-output').textContent = JSON.stringify(resp, null, 2);
    } else {
      document.getElementById('reportes-output').textContent = "Error: " + (resp ? resp.error : 'No se pudo obtener datos');
    }
  }

  function mostrarAlerta(msg, type) {
    const el = document.getElementById('status-alert');
    el.className = `alert alert-${type === 'danger' ? 'danger' : 'success'}`;
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function ocultarAlerta() {
    document.getElementById('status-alert').classList.add('hidden');
  }
</script>
</body>
</html>
